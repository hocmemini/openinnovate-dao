name: Governance Proposal Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        type: choice
        default: "evaluate"
        options:
          - "evaluate"
          - "recommend"
      proposal:
        description: "Path to proposal file (evaluate mode only)"
        required: false
        type: string
      dry_run:
        description: "Dry run — evaluate but do not commit on-chain"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      create_issues:
        description: "Create GitHub issues from result"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

  push:
    branches: [main]
    paths:
      - "governance/decisions/**"
      - "corpus/weights.json"
      - "governance-engine/system-prompt-*.md"

  schedule:
    # Weekly state of the DAO — Fridays at noon UTC
    - cron: "0 12 * * 5"
    # Annual governance heartbeat — prevents W.S. 17-31-114 dissolution
    # Runs Feb 1 each year, well before any anniversary deadline
    - cron: "0 12 1 2 *"

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  evaluate-proposal:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evaluate'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOVERNANCE_MODEL: claude-opus-4-6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Validate inputs
        run: |
          PROPOSAL="${{ github.event.inputs.proposal }}"
          if [ -z "$PROPOSAL" ]; then
            echo "ERROR: proposal input is required for evaluate mode"
            exit 1
          fi
          if [ ! -f "$PROPOSAL" ]; then
            echo "ERROR: proposal file not found: $PROPOSAL"
            exit 1
          fi

      - name: Evaluate proposal
        id: evaluate
        run: |
          PROPOSAL="${{ github.event.inputs.proposal }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          ARGS="--proposal $PROPOSAL"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python governance-engine/evaluate.py $ARGS 2>&1 | tee /tmp/eval-output.txt

          # Extract output path and recommendation
          OUTPUT=$(grep "Reasoning tree saved to:" /tmp/eval-output.txt | sed 's/.*saved to: //' || true)
          REC=$(grep "^Decision:" /tmp/eval-output.txt | sed 's/Decision: //' || true)

          if [ -n "$OUTPUT" ]; then
            echo "output_path=$OUTPUT" >> "$GITHUB_OUTPUT"
            echo "recommendation=$REC" >> "$GITHUB_OUTPUT"

            HASH=$(python3 -c "
          from hashlib import sha3_256
          with open('$OUTPUT', 'rb') as f:
              print('0x' + sha3_256(f.read()).hexdigest())
          ")
            echo "reasoning_hash=$HASH" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit reasoning tree
        if: github.event.inputs.dry_run == 'false' && steps.evaluate.outputs.output_path != ''
        run: |
          git config user.name "OpenInnovate Governance Bot"
          git config user.email "governance-bot@openinnovate.dao"
          git add governance/decisions/
          git commit -m "gov: reasoning tree for ${{ github.event.inputs.proposal }}

          Hash: ${{ steps.evaluate.outputs.reasoning_hash }}
          Model: ${{ env.GOVERNANCE_MODEL }}"
          git push

      - name: Create issues from evaluation
        if: >
          github.event.inputs.dry_run == 'false' &&
          github.event.inputs.create_issues == 'true' &&
          steps.evaluate.outputs.output_path != '' &&
          (steps.evaluate.outputs.recommendation == 'APPROVE' || steps.evaluate.outputs.recommendation == 'MODIFY')
        run: |
          python governance-engine/issue_manager.py \
            --decision "${{ steps.evaluate.outputs.output_path }}" \
            --proposal "${{ github.event.inputs.proposal }}"

      - name: Summary
        run: |
          echo "## Governance Evaluation Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Proposal:** \`${{ github.event.inputs.proposal }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run:** ${{ github.event.inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.evaluate.outputs.reasoning_hash }}" ]; then
            echo "- **Recommendation:** ${{ steps.evaluate.outputs.recommendation }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Reasoning hash:** \`${{ steps.evaluate.outputs.reasoning_hash }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Output:** \`${{ steps.evaluate.outputs.output_path }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  verify-decisions:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Identify changed decisions
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- governance/decisions/ | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed decisions: $FILES"

      - name: Verify decision hashes
        if: steps.changed.outputs.files != ''
        run: |
          for FILE in ${{ steps.changed.outputs.files }}; do
            echo "Verifying: $FILE"
            python governance-engine/verify.py --decision "$FILE" --check-hash
          done

      - name: Verify corpus integrity
        run: python governance-engine/verify.py --corpus-integrity

      - name: Verify system prompt integrity
        run: |
          python -c "
          import json, hashlib, sys
          from pathlib import Path
          hashes_file = Path('governance-engine/prompt-hashes.json')
          if not hashes_file.exists():
              print('WARNING: No prompt-hashes.json found')
              sys.exit(0)
          expected = json.loads(hashes_file.read_text()).get('hashes', {})
          failed = False
          for name, expected_hash in expected.items():
              path = Path('governance-engine') / name
              if not path.exists():
                  print(f'WARNING: {name} not found')
                  continue
              actual = hashlib.sha256(path.read_bytes()).hexdigest()
              if actual != expected_hash:
                  print(f'FAIL: {name} hash mismatch (governance decision required for prompt changes)')
                  failed = True
              else:
                  print(f'OK: {name}')
          if failed:
              sys.exit(1)
          print('All system prompts verified.')
          "

      - name: Verify weights.json governance
        run: |
          # Check if weights.json was modified in this push
          WEIGHTS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- corpus/weights.json || true)
          if [ -n "$WEIGHTS_CHANGED" ]; then
            echo "WARNING: corpus/weights.json was modified"
            # Check commit message for governance decision reference
            COMMIT_MSG=$(git log -1 --format=%B)
            if echo "$COMMIT_MSG" | grep -qiE '(decision|proposal|P[0-9]{3})'; then
              echo "OK: Commit references a governance decision"
            else
              echo "FAIL: weights.json modified without governance decision reference in commit message"
              echo "Corpus weight changes require a governance decision. Include 'Decision #N' or 'Proposal #NNN' in commit message."
              exit 1
            fi
          fi
          python -c "
          import hashlib; from pathlib import Path
          h = hashlib.sha256(Path('corpus/weights.json').read_bytes()).hexdigest()
          print(f'weights.json SHA-256: {h}')
          "

      - name: Summary
        run: |
          echo "## Verification Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** push to governance/decisions/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Changed:** \`${{ steps.changed.outputs.files }}\`" >> "$GITHUB_STEP_SUMMARY"

  ceo-strategic-review:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'recommend') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOVERNANCE_MODEL: claude-opus-4-6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run CEO strategic review
        id: recommend
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Annual heartbeat (Feb 1) creates issues; weekly (Fridays) is state-only
            MONTH=$(date +%m)
            DAY=$(date +%d)
            if [ "$MONTH" = "02" ] && [ "$DAY" -le "3" ]; then
              echo "Annual governance heartbeat — full review with issue creation"
              ARGS="--create-issues"
            else
              echo "Weekly state summary — no API call"
              ARGS="--state-only"
            fi
          elif [ "${{ github.event.inputs.create_issues }}" = "true" ]; then
            ARGS="--create-issues"
          else
            ARGS="--dry-run"
          fi

          echo "mode=$ARGS" >> "$GITHUB_OUTPUT"
          python governance-engine/recommend.py $ARGS 2>&1 | tee /tmp/recommend-output.txt

      - name: Commit recommendations
        if: steps.recommend.outputs.mode == '--create-issues'
        run: |
          git config user.name "OpenInnovate Governance Bot"
          git config user.email "governance-bot@openinnovate.dao"
          git add governance/recommendations/ || true
          if git diff --cached --quiet; then
            echo "No new files to commit"
          else
            git commit -m "gov: CEO strategic review $(date +%Y-%m-%d)"
            git push
          fi

      - name: Summary
        run: |
          MODE="${{ steps.recommend.outputs.mode }}"
          if [ "$MODE" = "--state-only" ]; then
            echo "## Weekly State of the DAO" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## CEO Strategic Review" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode:** $MODE" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/recommend-output.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -30 /tmp/recommend-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
